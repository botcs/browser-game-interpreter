<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BroGI - Live Narrator</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      background: white;
      color: black;
      min-height: 100vh;
    }
    a { color: black; }

    .wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px;
    }

    header {
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 1.5px solid black;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 42px;
      font-weight: normal;
      color: black;
      margin-bottom: 4px;
    }
    header .subtitle {
      font-size: 18px;
      color: #555;
    }

    /* --- Two-column layout --- */
    .main-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 20px;
    }

    .left-col {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
      overflow: hidden;
    }

    /* --- Game canvas area --- */
    .canvas-flaps-group {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .canvas-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
    }

    #game-canvas {
      border: 3px solid #ccc;
      background: #000;
      outline: none;
      display: block;
      max-width: 100%;
      height: auto;
    }
    #game-canvas:focus {
      border-color: #333;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.2);
    }

    /* Canvas overlay buttons */
    .canvas-btn {
      position: absolute;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 4px;
      width: 28px;
      height: 28px;
      padding: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .canvas-btn:hover {
      background: rgba(255,255,255,0.9);
    }
    .canvas-btn img {
      width: 18px;
      height: 18px;
    }

    #btn-cog { top: 6px; left: 6px; }
    #btn-play { top: 6px; right: 38px; }
    #btn-reset { top: 6px; right: 6px; }

    /* Speed popover */
    .speed-popover {
      display: none;
      position: absolute;
      top: 38px;
      left: 6px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      padding: 8px 10px;
      z-index: 20;
      font-size: 14px;
    }
    .speed-popover.open { display: block; }
    .speed-popover label {
      font-size: 14px;
      color: #333;
    }
    .speed-popover select {
      font-family: 'EB Garamond', serif;
      font-size: 14px;
      padding: 2px 6px;
      border: 1px solid #999;
      background: #eee;
      border-radius: 3px;
      cursor: pointer;
    }

    /* Create New Env overlay button */
    #btn-create-env {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 6px;
      padding: 8px 18px;
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      cursor: pointer;
      z-index: 15;
    }
    #btn-create-env:hover {
      background: rgba(0,0,0,0.9);
    }

    /* Flap tabs */
    .flap-tabs {
      display: flex;
      gap: 0;
    }
    .flap-tab {
      flex: 1;
      text-align: center;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
      padding: 4px 14px;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 4px 4px;
      background: #eee;
      color: #555;
      cursor: pointer;
    }
    .flap-tab:hover { background: #ddd; }
    .flap-tab.active {
      color: black;
      border-color: #aaa;
      border-bottom: none;
      border-radius: 0;
    }
    #flap-tab-desc.active { background: #f0f8f0; }
    #flap-tab-level.active { background: #fdf0f0; }

    /* Flap panels */
    .flap-panel {
      display: none;
      border: 1px solid #aaa;
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 8px;
    }
    .flap-panel.open { display: block; }
    .flap-panel-desc { background: #f0f8f0; }
    .flap-panel-level { background: #fdf0f0; }

    .flap-panel textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: black;
      resize: vertical;
      tab-size: 4;
    }
    .flap-panel-desc textarea { height: 300px; }
    .flap-panel-level textarea { height: 180px; }

    /* Help text */
    .help {
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    /* Action log */
    .action-log {
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 6px;
      background: #fafafa;
    }
    .action-log .log-entry {
      padding: 1px 4px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* --- Right column: narrator panel --- */

    /* Settings section */
    .narrator-settings {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
    }
    .narrator-settings summary {
      cursor: pointer;
      font-size: 15px;
      color: #555;
      padding: 2px 0;
    }
    .narrator-settings .settings-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      align-items: center;
      margin-top: 8px;
    }
    .narrator-settings label {
      font-size: 13px;
      color: #555;
      text-align: right;
    }
    .narrator-settings input,
    .narrator-settings select {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 3px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #fafafa;
    }
    .narrator-settings select {
      font-family: 'EB Garamond', serif;
      cursor: pointer;
    }
    .narrator-settings input[type="number"] {
      width: 70px;
    }

    /* Narrate button */
    #btn-narrate {
      font-family: 'EB Garamond', serif;
      font-size: 18px;
      padding: 8px 24px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #f8f8f8;
      cursor: pointer;
      align-self: flex-start;
    }
    #btn-narrate:hover { background: #eee; }
    #btn-narrate:disabled {
      opacity: 0.5;
      cursor: wait;
    }

    /* Narrative response panel */
    .narrative-panel {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px;
      display: none;
    }
    .narrative-panel.visible { display: block; }
    .narrative-panel h3 {
      font-size: 16px;
      margin-bottom: 6px;
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 4px;
    }

    .thought-section {
      margin-bottom: 10px;
    }
    .thought-section .label {
      font-size: 13px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .thought-section .content {
      font-size: 15px;
      color: #222;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .narrative-loading {
      display: none;
      font-size: 14px;
      color: #888;
      padding: 8px 0;
    }

    /* Prompt details (collapsible) */
    .prompt-details {
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .prompt-details summary {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      color: #666;
    }
    .prompt-details .prompt-content {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 300px;
      overflow-y: auto;
      padding: 8px 12px;
      border-top: 1px solid #eee;
      background: #f9f9f9;
    }

    /* --- Game library --- */
    .library-section {
      border-top: 1.5px solid black;
      margin-top: 30px;
      padding-top: 20px;
    }
    .library-section h2 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 14px;
    }
    .library-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .library-game {
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
    }
    .library-game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 18px;
      background: #f8f8f8;
      user-select: none;
    }
    .library-game-header:hover { background: #eee; }
    .library-game-header .arrow {
      font-size: 14px;
      color: #888;
      transition: none;
    }
    .library-game.expanded .library-game-header .arrow {
      transform: rotate(90deg);
    }
    .library-game-body {
      display: none;
      padding: 6px 10px;
      border-top: 1px solid #ddd;
    }
    .library-game.expanded .library-game-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .library-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 15px;
    }
    .library-item-level { background: #fdf0f0; }
    .library-item:hover {
      filter: brightness(0.95);
    }

    /* --- Mobile D-Pad --- */
    .dpad {
      display: none;
      position: relative;
      width: 120px;
      height: 120px;
      margin: 10px auto 0;
    }
    .dpad-btn {
      position: absolute;
      width: 38px;
      height: 38px;
      background: rgba(0,0,0,0.15);
      border: 1px solid rgba(0,0,0,0.2);
      border-radius: 6px;
      font-size: 18px;
      color: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active {
      background: rgba(0,0,0,0.3);
    }
    .dpad-up    { top: 0;   left: 41px; }
    .dpad-down  { bottom: 0; left: 41px; }
    .dpad-left  { top: 41px; left: 0; }
    .dpad-right { top: 41px; right: 0; }
    .dpad-space {
      top: 41px;
      left: 41px;
      font-size: 11px;
      font-family: 'EB Garamond', serif;
    }

    /* --- Responsive --- */
    @media (pointer: coarse) {
      .help { display: none; }
      .dpad { display: block; }
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .wrapper { padding: 10px; }
      header h1 { font-size: 32px; }
      header .subtitle { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <h1><b>Bro</b>wser <b>G</b>ame <b>I</b>nterpreter -- Live Narrator</h1>
      <div class="subtitle">Play a VGDL game and get LLM narration of your gameplay</div>
    </header>

    <div class="main-layout">
      <!-- Left column: game -->
      <div class="left-col">
        <div class="canvas-flaps-group">
          <div class="canvas-wrapper">
            <canvas id="game-canvas" width="630" height="360" tabindex="0"></canvas>
            <button class="canvas-btn" id="btn-cog" tabindex="-1"><img src="cog.png" alt="settings"></button>
            <button class="canvas-btn" id="btn-play" tabindex="-1"><img id="play-icon" src="play.png" alt="play"></button>
            <button class="canvas-btn" id="btn-reset" tabindex="-1"><img src="reset.png" alt="reset"></button>
            <div class="speed-popover" id="speed-popover">
              <label>Speed:
                <select id="tick-mode">
                  <option value="action">On keypress</option>
                  <option value="2">2 FPS</option>
                  <option value="4">4 FPS</option>
                  <option value="7" selected>7 FPS</option>
                  <option value="10">10 FPS</option>
                  <option value="15">15 FPS</option>
                  <option value="30">30 FPS</option>
                </select>
              </label>
            </div>
            <button id="btn-create-env">Create New Env</button>
          </div>

          <div class="flap-tabs">
            <button class="flap-tab" id="flap-tab-desc">Game Description</button>
            <button class="flap-tab" id="flap-tab-level">Level Layout</button>
          </div>
          <div class="flap-panel flap-panel-desc" id="flap-panel-desc">
            <textarea id="game-desc" spellcheck="false"></textarea>
          </div>
          <div class="flap-panel flap-panel-level" id="flap-panel-level">
            <textarea id="level-text" spellcheck="false"></textarea>
          </div>
        </div>

        <div class="help">
          Arrow keys / WASD = move | Space = action | P = play/pause | Enter = load game
        </div>

        <div class="action-log" id="action-log"></div>

        <div class="dpad" id="dpad">
          <button class="dpad-btn dpad-up" data-action="UP">^</button>
          <button class="dpad-btn dpad-left" data-action="LEFT">&lt;</button>
          <button class="dpad-btn dpad-space" data-action="SPACE">act</button>
          <button class="dpad-btn dpad-right" data-action="RIGHT">&gt;</button>
          <button class="dpad-btn dpad-down" data-action="DOWN">v</button>
        </div>
      </div>

      <!-- Right column: narrator -->
      <div class="right-col">
        <details class="narrator-settings" open>
          <summary>Narrator Settings</summary>
          <div class="settings-grid">
            <label for="narrator-api-key">API Key</label>
            <input type="password" id="narrator-api-key" placeholder="sk-or-...">

            <label for="narrator-model">Model</label>
            <input type="text" id="narrator-model" value="deepseek/deepseek-chat-v3-0324">

            <label for="narrator-variant">Prompt</label>
            <select id="narrator-variant">
              <option value="oracle">Oracle Narrator</option>
              <option value="observer" selected>Observer (blind)</option>
              <option value="narrator">Narrator (blind)</option>
            </select>

            <label for="narrator-history-limit">History limit</label>
            <input type="number" id="narrator-history-limit" value="50" min="1" max="500">
          </div>
        </details>

        <button id="btn-narrate">Narrate</button>

        <div class="narrative-loading" id="narrative-loading">Waiting for LLM response...</div>

        <div class="narrative-panel" id="narrative-panel">
          <h3>Narrative</h3>
          <div id="narrative-content"></div>
        </div>

        <details class="prompt-details" id="prompt-details">
          <summary>Last Prompt Sent</summary>
          <div class="prompt-content" id="last-prompt-content">(click Narrate to see)</div>
        </details>
      </div>
    </div>

    <div class="library-section">
      <h2>Game Library</h2>
      <div class="library-list" id="library-list"></div>
    </div>
  </div>

  <script type="module" src="narrator-main.js"></script>
</body>
</html>
